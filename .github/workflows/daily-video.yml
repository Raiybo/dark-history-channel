name: Daily Did You Know Videos

on:
  # 6 reels/day (the free YouTube API ceiling: ~6 uploads/day at 1600 units each
  # against the default 10k/day quota), spread across high-engagement windows for
  # a Lebanon (Asia/Beirut) audience. Times below are UTC; Beirut is UTC+3 (EEST).
  # NOTE: GitHub cron is fixed UTC and does NOT follow DST — in winter (EET,
  # UTC+2) each post lands 1h later in Beirut, so nudge these by +1h around late
  # October if you want the exact same local times year-round.
  schedule:
    - cron: '0 5 * * *'    # 08:00 Beirut — morning
    - cron: '30 8 * * *'   # 11:30 Beirut — late morning
    - cron: '30 10 * * *'  # 13:30 Beirut — lunch
    - cron: '0 13 * * *'   # 16:00 Beirut — afternoon
    - cron: '0 16 * * *'   # 19:00 Beirut — prime evening
    - cron: '30 18 * * *'  # 21:30 Beirut — night peak
  workflow_dispatch:        # Manual trigger from GitHub UI (posts one reel)

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium fonts-liberation
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium" >> $GITHUB_ENV

      - name: Install Python TTS
        run: pip3 install edge-tts

      - name: Install npm dependencies
        run: npm ci

      - name: Generate & upload one Did You Know reel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          CI: 'true'
          UPLOAD: '1'
          GENRE_OVERRIDE: didyouknow
        run: node src/main.js

      - name: Commit updated used-ideas.json
        if: always()
        run: |
          git config user.name "Distoir Bot"
          git config user.email "bot@distoir.auto"
          git add config/used-ideas.json
          git diff --staged --quiet || git commit -m "chore: mark used topics [skip ci]"
          git pull --rebase origin main
          git push
