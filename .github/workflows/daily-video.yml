name: Daily Did You Know Videos

on:
  schedule:
    - cron: '0 23 * * *'  # Every day at 11:00 PM UTC (7PM EST / 4PM PST)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium fonts-liberation
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium" >> $GITHUB_ENV

      - name: Install Python TTS
        run: pip3 install edge-tts

      - name: Install npm dependencies
        run: npm ci

      - name: Generate & upload 5 Did You Know reels
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          CI: 'true'
          UPLOAD: '1'
          GENRE_OVERRIDE: didyouknow
        run: |
          for i in 1 2 3 4 5; do
            echo "──────────── Reel $i / 5 ────────────"
            node src/main.js || echo "Reel $i failed — continuing"
          done

      - name: Commit updated used-ideas.json
        if: always()
        run: |
          git config user.name "Distoir Bot"
          git config user.email "bot@distoir.auto"
          git add config/used-ideas.json
          git diff --staged --quiet || git commit -m "chore: mark used topics [skip ci]"
          git pull --rebase origin main
          git push
