name: Daily Did You Know Videos

on:
  # 6 reels/day (the free YouTube API ceiling: ~6 uploads/day at 1600 units each
  # against the default 10k/day quota), spread across high-engagement windows for
  # a US audience (analytics: majority American viewers). Times below are UTC.
  # Timings target US Eastern peaks; Pacific viewers are 3h earlier which lands
  # each slot in a still-relevant window for them too.
  # NOTE: GitHub cron is fixed UTC and does NOT follow DST. These times are set
  # for EDT (UTC-4, summer). In winter (EST, UTC-5) each post lands 1h earlier
  # in local US time — nudge the crons -1h around early November if you want to
  # hold the exact same local times year-round.
  schedule:
    # Back to 6/day on 2026-07-11 (user decision) — now TREND-DRIVEN: each run
    # pulls what's trending across Google Trends / Reddit / Wikipedia / YouTube
    # and rides a different trending subject, so the six daily videos are far
    # more varied than the old template (variety = less "mass-produced" signal).
    - cron: '0 11 * * *'   # 07:00 EDT — US East morning commute
    - cron: '30 15 * * *'  # 11:30 EDT — pre-lunch scroll
    - cron: '0 17 * * *'   # 13:00 EDT — lunch break
    - cron: '0 21 * * *'   # 17:00 EDT — evening commute
    - cron: '30 23 * * *'  # 19:30 EDT — prime time
    - cron: '0 3 * * *'    # 23:00 EDT — late-night scroll (previous day for US)
  workflow_dispatch:        # Manual trigger from GitHub UI (posts one reel)

# Serialize ALL runs (scheduled + manual). Parallel runs race on idea-generation
# — they each read the same used-ideas.json before any has pushed, so Groq can
# return the same topic to multiple runs. With this lock, the next run waits
# for the current to finish and push, then starts with up-to-date state. Also
# prevents Groq's per-minute token budget from being hammered by parallel runs.
concurrency:
  group: daily-video
  cancel-in-progress: false

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium fonts-liberation
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium" >> $GITHUB_ENV

      - name: Install Python TTS
        run: pip3 install edge-tts

      - name: Install npm dependencies
        run: npm ci

      - name: Generate & upload one Did You Know reel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          # YouTube Studio session cookies (JSON array) — drives the post-upload
          # headless flow that flips the "don't show how many viewers like this
          # video" toggle. The flow no-ops gracefully if this is missing.
          YT_STUDIO_COOKIES: ${{ secrets.YT_STUDIO_COOKIES }}
          # TikTok draft delivery (optional — only acts if all three are set)
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          CI: 'true'
          UPLOAD: '1'
          GENRE_OVERRIDE: didyouknow
        run: node src/main.js

      - name: Commit updated used-ideas.json
        if: always()
        run: |
          git config user.name "Distoir Bot"
          git config user.email "bot@distoir.auto"
          # Bail early if this run didn't add anything (e.g. failed before idea-gen).
          if git diff --quiet -- config/used-ideas.json; then
            echo "No local additions to commit."
            exit 0
          fi
          # Race-safe merge: another bot may have pushed entries while we ran.
          # Snapshot OUR additions, sync to latest remote, then merge both sides
          # by union (entries are objects so dedup on a composite key). With this
          # neither bot's additions are lost on a concurrent push.
          cp config/used-ideas.json /tmp/local-ideas.json
          git fetch origin main
          git reset --hard origin/main
          jq -s '
            (.[0] // []) + (.[1] // [])
            | unique_by((.title // "") + "|" + (.topic // "") + "|" + (.date // ""))
            | sort_by(.date // "")
          ' config/used-ideas.json /tmp/local-ideas.json > /tmp/merged-ideas.json
          mv /tmp/merged-ideas.json config/used-ideas.json
          git add config/used-ideas.json
          if git diff --staged --quiet; then
            echo "Local additions already on remote — nothing to push."
            exit 0
          fi
          git commit -m "chore: mark used topics [skip ci]"
          # One retry on push race (another bot may have pushed in the last few ms).
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push race, refreshing and retrying ($i/3)..."
            git pull --rebase -X theirs origin main || git rebase --abort
            sleep 2
          done
          echo "Push failed after retries."
          exit 1
