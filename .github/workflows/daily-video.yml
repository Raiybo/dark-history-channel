name: Daily Distoir Videos

on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 9:00 AM UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium fonts-liberation
          echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium" >> $GITHUB_ENV

      - name: Install Python TTS
        run: pip3 install edge-tts

      - name: Install npm dependencies
        run: npm ci

      - name: Video 1 — Future-History
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          CI: 'true'
          UPLOAD: '1'
          GENRE_OVERRIDE: future
        run: node src/main.js

      - name: Video 2 — Optimization
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          CI: 'true'
          UPLOAD: '1'
          GENRE_OVERRIDE: optimize
        run: node src/main.js

      - name: Video 3 — Future-History
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          CI: 'true'
          UPLOAD: '1'
          GENRE_OVERRIDE: future
        run: node src/main.js

      - name: Commit updated used-ideas.json
        run: |
          git config user.name "Distoir Bot"
          git config user.email "bot@distoir.auto"
          git add config/used-ideas.json
          git diff --staged --quiet || git commit -m "chore: mark used topics [skip ci]"
          git push
